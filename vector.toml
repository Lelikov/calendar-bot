data_dir = "/var/lib/vector"

[sources.docker]
type = "docker_logs"
docker_host = "unix:///var/run/docker.sock"

[transforms.enrich]
type = "remap"
inputs = ["docker"]
source = '''
.message = compact([.message, .log, ""])[0]

.stream = compact([.stream, "unknown"])[0]

if .timestamp == null {
  .timestamp = now()
}

."@timestamp" = .timestamp

.container_name = compact([.container_name, ""])[0]
.container_id = compact([.container_id, ""])[0]
.image = compact([.image, ""])[0]

if .labels == null && is_object(.label) {
  .labels = .label
}
.labels = compact([.labels, {}])[0]
del(.label)

.compose_project = .labels."com.docker.compose.project"
.compose_service = .labels."com.docker.compose.service"

del(.labels)

parsed, err = parse_json(.message)
if err == null && is_object(parsed) {
  . = merge!(., parsed)
}

del(.host)
'''

[sinks.opensearch]
type = "elasticsearch"
inputs = ["enrich"]
endpoints = ["http://opensearch:9200"]

api_version = "v8"

mode = "bulk"
compression = "gzip"

[sinks.opensearch.bulk]
action = "index"
index = "logs-docker-%Y.%m.%d"
